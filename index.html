<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniTube - Dynamic Ads & Points</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        :root { --main: #ff0000; --bg: #ffffff; --accent: #28a745; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }
        header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #f8f8f8; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .points { background: #ffd700; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .ad-btn { background: var(--accent); color: #fff; border: none; padding: 12px; width: 92%; margin: 10px auto; display: block; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; }
        .video-grid { padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; position: relative; }
        .thumb { width: 100%; height: 180px; background-size: cover; background-position: center; background-color: #eee; }
        .v-info { padding: 10px; }
        .price-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #fff; padding: 3px 8px; border-radius: 5px; font-size: 12px; }
        #player-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; color: #fff; }
        video { width: 100%; max-height: 250px; background: #000; }
        .close-btn { background: var(--main); color: #fff; border: none; padding: 12px; width: 90%; margin: 20px auto; display: block; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h2 style="color: var(--main); margin: 0;">MiniTube</h2>
        <div class="points">💰 <span id="u-points">0</span></div>
    </header>

    <button class="ad-btn" onclick="watchAdAndEarn()">📺 বিজ্ঞাপন দেখে ১০ পয়েন্ট নিন</button>

    <div id="main-page">
        <div id="video-list" class="video-grid">ভিডিও লোড হচ্ছে...</div>
    </div>

    <div id="player-screen">
        <video id="v-player" controls playsinline></video>
        <div style="padding: 20px;">
            <h3 id="v-title" style="margin: 0;"></h3>
            <p id="v-channel" style="color: #aaa; margin: 10px 0; font-size: 14px;"></p>
            <button class="close-btn" onclick="closePlayer()">বন্ধ করুন (Back)</button>
        </div>
    </div>

    <script>
        // --- Supabase Config (আপনার দেওয়া ডিটেইলস) ---
        const S_URL = "https://psvpzoblbyfromfzaltbw.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzdnB6b2JsYnlmcm9memFsdGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTM3NDIsImV4cCI6MjA5MDA4OTc0Mn0.rmidmNF4s1F_Fjk10AJWeig5oM-sqABnZNoWwn09jmQ";
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        const tg = window.Telegram.WebApp;
        const userId = tg.initDataUnsafe.user?.id?.toString() || "guest_123";
        
        // গ্লোবাল সেটিংস ভেরিয়েবল
        let userPoints = 0;
        let dynamicAdLink = ""; 
        let minPointsRequired = 5;

        async function init() {
            tg.expand();
            
            // ১. ডাটাবেস থেকে সেটিংস (অ্যাড লিঙ্ক ও পয়েন্ট) লোড করা
            const { data: settings } = await supabaseClient.from('settings').select('*').eq('id', 1).single();
            if (settings) {
                dynamicAdLink = settings.ad_link;
                minPointsRequired = settings.min_points_to_play || 5;
            }

            // ২. ইউজার ডাটা চেক বা তৈরি
            let { data: user } = await supabaseClient.from('users').select('*').eq('id', userId).single();
            if (!user) {
                const { data } = await supabaseClient.from('users').insert([{ id: userId, points: 50 }]).select().single();
                user = data;
            }
            userPoints = user.points;
            updateUI();
            loadVideos();
        }

        function updateUI() {
            document.getElementById('u-points').innerText = userPoints;
        }

        async function loadVideos() {
            const { data: videos } = await supabaseClient.from('videos').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('video-list');
            list.innerHTML = '';
            if (videos) {
                videos.forEach(v => {
                    list.innerHTML += `
                        <div class="card" onclick="handleVideoClick('${v.url}', '${v.title}', '${v.channel}')">
                            <div class="thumb" style="background-image:url('${v.thumbnail}')"></div>
                            <div class="price-tag">Cost: ${minPointsRequired}</div>
                            <div class="v-info"><b>${v.title}</b><br><small>${v.channel}</small></div>
                        </div>
                    `;
                });
            }
        }

        // ভিডিও প্লে করার লজিক (অ্যাডমিন প্যানেলের সেটিংস অনুযায়ী)
        async function handleVideoClick(url, title, channel) {
            if (userPoints < minPointsRequired) {
                tg.showAlert(`ব্যালেন্স কম! ভিডিও দেখতে ${minPointsRequired} পয়েন্ট লাগবে।`);
                return;
            }

            // অ্যাডমিন প্যানেলের লিঙ্ক ওপেন করা (যদি থাকে)
            if (dynamicAdLink) {
                window.open(dynamicAdLink, "_blank");
            }

            // পয়েন্ট কাটা ও আপডেট
            userPoints -= minPointsRequired;
            updateUI();
            await supabaseClient.from('users').update({ points: userPoints }).eq('id', userId);

            // প্লেয়ার চালু
            document.getElementById('main-page').style.display = 'none';
            document.getElementById('player-screen').style.display = 'block';
            const player = document.getElementById('v-player');
            player.src = url;
            player.play();
            document.getElementById('v-title').innerText = title;
            document.getElementById('v-channel').innerText = channel;
            tg.BackButton.show();
        }

        // বিজ্ঞাপন দেখে আয়
        function watchAdAndEarn() {
            if (!dynamicAdLink) {
                tg.showAlert("বর্তমানে কোনো বিজ্ঞাপন উপলব্ধ নেই।");
                return;
            }

            tg.showConfirm("বিজ্ঞাপনটি দেখলে ১০ পয়েন্ট পাবেন। দেখতে চান?", (ok) => {
                if(ok) {
                    window.open(dynamicAdLink, "_blank");
                    setTimeout(async () => {
                        userPoints += 10;
                        updateUI();
                        await supabaseClient.from('users').update({ points: userPoints }).eq('id', userId);
                        tg.showAlert("অভিনন্দন! ১০ পয়েন্ট যোগ করা হয়েছে।");
                    }, 5000); // ৫ সেকেন্ড অপেক্ষা
                }
            });
        }

        function closePlayer() {
            document.getElementById('v-player').pause();
            document.getElementById('player-screen').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
            tg.BackButton.hide();
        }

        tg.BackButton.onClick(closePlayer);
        init();
    </script>
</body>
</html>

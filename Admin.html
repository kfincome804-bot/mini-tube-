<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniTube Pro - Secure Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #ff0000; --bg: #f0f2f5; --card-bg: #fff; --text: #333; --accent: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .admin-container { max-width: 1000px; margin: auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        @media (max-width: 768px) { .admin-container { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 1px solid #eee; margin-bottom: 20px; }
        h2 { color: var(--main); margin-top: 0; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--accent); color: white; }
        .btn-update-settings { background: #007bff; color: white; }
        .video-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #eee; background: #fff; border-radius: 8px; margin-bottom: 10px; }
        .v-thumb-preview { width: 70px; height: 45px; border-radius: 4px; object-fit: cover; background: #eee; }
        .v-meta { flex-grow: 1; }
        .v-name { font-weight: bold; font-size: 14px; color: #333; display: block; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .status-bar { grid-column: 1 / -1; background: #fff; padding: 12px 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; font-size: 14px; color: #666; }
        b { color: var(--main); }
    </style>
</head>
<body>

<div id="admin-content" style="display:none;">
    <div class="admin-container">
        
        <div class="status-bar card">
            <div>মোট ভিডিও: <b id="total-videos">0</b></div>
            <div>বিজ্ঞাপন স্ট্যাটাস: <b id="ad-status">লোড হচ্ছে...</b></div>
        </div>

        <div class="card">
            <h2>অ্যাপ সেটিংস</h2>
            <div class="form-group">
                <label>Monetag Direct Link (বিজ্ঞাপন)</label>
                <input type="text" id="set-ad-link" placeholder="https://monetag-link.com/...">
            </div>
            <div class="form-group">
                <label>ভিডিও দেখতে কত পয়েন্ট লাগবে?</label>
                <input type="number" id="set-min-points" value="5">
            </div>
            <button class="btn btn-update-settings" onclick="updateAppSettings()">সেটিংস আপডেট করুন</button>
        </div>

        <div class="card">
            <h2>নতুন ভিডিও যোগ করুন</h2>
            <div class="form-group"><input type="text" id="v-title" placeholder="ভিডিওর শিরোনাম"></div>
            <div class="form-group"><input type="text" id="v-channel" placeholder="চ্যানেল বা ইউজারের নাম"></div>
            <div class="form-group"><input type="text" id="v-url" placeholder="ভিডিও লিঙ্ক (Direct Video URL)"></div>
            <div class="form-group">
                <select id="v-cat">
                    <option value="Movie">Movie</option>
                    <option value="Funny">Funny</option>
                    <option value="Music">Music</option>
                    <option value="News">News</option>
                </select>
            </div>
            <button class="btn btn-save" id="save-btn" onclick="saveVideo()">ভিডিও সেভ করুন</button>
            <p style="font-size: 11px; color: #888; margin-top: 10px;">* ভিডিও লিঙ্ক থেকে থাম্বনেইল অটো তৈরি হবে।</p>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <h2>ভিডিও লিস্ট</h2>
            <div id="video-list">লোড হচ্ছে...</div>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASS = "@24342211";
    const userPass = prompt("অ্যাডমিন পাসওয়ার্ড দিন:");

    if (userPass !== ADMIN_PASS) {
        alert("ভুল পাসওয়ার্ড!");
        document.body.innerHTML = "<h1 style='text-align:center; margin-top:100px; color:red;'>Access Denied!</h1>";
    } else {
        document.getElementById('admin-content').style.display = 'block';
        startAdmin();
    }

    function startAdmin() {
        const S_URL = "https://psvpzoblbyfromfzaltbw.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzdnB6b2JsYnlmcm9memFsdGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTM3NDIsImV4cCI6MjA5MDA4OTc0Mn0.rmidmNF4s1F_Fjk10AJWeig5oM-sqABnZNoWwn09jmQ";
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        // --- অটো থাম্বনেইল জেনারেটর ফাংশন ---
        async function generateThumbnail(videoUrl) {
            return new Promise((resolve) => {
                const video = document.createElement("video");
                video.src = videoUrl;
                video.crossOrigin = "anonymous";
                video.currentTime = 1;
                video.muted = true;

                video.onloadeddata = () => {
                    const canvas = document.createElement("canvas");
                    canvas.width = 320;
                    canvas.height = 180;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL("image/jpeg"));
                };

                video.onerror = () => {
                    resolve('https://via.placeholder.com/320x180?text=No+Thumbnail');
                };
            });
        }

        async function loadSettings() {
            try {
                const { data } = await supabaseClient.from('settings').select('*').eq('id', 1).single();
                if (data) {
                    document.getElementById('set-ad-link').value = data.ad_link || '';
                    document.getElementById('set-min-points').value = data.min_points_to_play || 5;
                    document.getElementById('ad-status').innerText = data.ad_link ? 'সক্রিয়' : 'বন্ধ';
                }
            } catch (err) { console.error(err); }
        }

        window.updateAppSettings = async function() {
            const adLink = document.getElementById('set-ad-link').value;
            const minPts = document.getElementById('set-min-points').value;
            const { error } = await supabaseClient.from('settings').update({
                ad_link: adLink,
                min_points_to_play: parseInt(minPts)
            }).eq('id', 1);

            if (error) alert("ভুল: " + error.message);
            else { alert("সেটিংস আপডেট হয়েছে!"); loadSettings(); }
        }

        window.saveVideo = async function() {
            const title = document.getElementById('v-title').value;
            const channel = document.getElementById('v-channel').value;
            const url = document.getElementById('v-url').value;
            const category = document.getElementById('v-cat').value;

            if (!title || !url) return alert("শিরোনাম এবং লিঙ্ক অবশ্যই দিতে হবে!");

            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerText = "থাম্বনেইল তৈরি হচ্ছে...";

            // অটো থাম্বনেইল জেনারেট করা হচ্ছে
            const thumb = await generateThumbnail(url);
            saveBtn.innerText = "সেভ হচ্ছে...";

            const { error } = await supabaseClient
                .from('videos')
                .insert([{ title, channel, url, category, thumbnail: thumb }]);

            if (error) {
                alert("এরর: " + error.message);
            } else {
                alert("ভিডিও সফলভাবে সেভ হয়েছে!");
                document.getElementById('v-title').value = '';
                document.getElementById('v-url').value = '';
                document.getElementById('v-channel').value = '';
                loadAdminVideos();
            }
            saveBtn.disabled = false;
            saveBtn.innerText = "ভিডিও সেভ করুন";
        }

        async function loadAdminVideos() {
            const { data: videos } = await supabaseClient.from('videos').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('video-list');
            document.getElementById('total-videos').innerText = videos ? videos.length : 0;
            list.innerHTML = '';
            
            videos.forEach(v => {
                list.innerHTML += `
                    <div class="video-item">
                        <img src="${v.thumbnail}" class="v-thumb-preview">
                        <div class="v-meta">
                            <span class="v-name">${v.title}</span>
                            <small style="color:#888">${v.channel || 'No Name'}</small>
                        </div>
                        <button class="btn-delete" onclick="deleteVideo('${v.id}')">ডিলিট</button>
                    </div>
                `;
            });
        }

        window.deleteVideo = async function(id) {
            if (confirm("ভিডিওটি ডিলিট করতে চান?")) {
                const { error } = await supabaseClient.from('videos').delete().eq('id', id);
                if (error) alert("এরর: " + error.message);
                else loadAdminVideos();
            }
        }

        loadSettings();
        loadAdminVideos();
    }
</script>
</body>
</html>
</html>

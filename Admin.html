        .btn-save { background: var(--accent); color: white; }

        .v-thumb { width: 60px; height: 40px; border-radius: 4px; object-fit: cover; }

            }
        }

        loadVideos();
    }

        async function getThumbnail(videoUrl) {
            return new Promise((resolve) => {
                const video = document.createElement("video");
                video.crossOrigin = "anonymous";
                video.src = videoUrl;
                video.currentTime = 1;
                video.muted = true;

                const timeout = setTimeout(() => resolve(null), 4000); // ৪ সেকেন্ডে কাজ না হলে বাদ

                video.onloadeddata = () => {
                    clearTimeout(timeout);
                    try {
                        const canvas = document.createElement("canvas");
                        canvas.width = 320; canvas.height = 180;
                        canvas.getContext("2d").drawImage(video, 0, 0, 320, 180);
                        resolve(canvas.toDataURL("image/jpeg"));
                    } catch (e) { resolve(null); }
                };
                video.onerror = () => { clearTimeout(timeout); resolve(null); };
            });
        }

        window.saveVideo = async function() {
            let url = document.getElementById('v-url').value;
            const title = document.getElementById('v-title').value;
            const channel = document.getElementById('v-channel').value;

            }]);

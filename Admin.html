<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>MiniTube Pro Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
.card { background:#fff; padding:20px; border-radius:10px; margin-bottom:20px; }
input, select { width:100%; padding:10px; margin:5px 0; }
button { padding:10px; border:none; background:#28a745; color:#fff; cursor:pointer; }
.video { border-bottom:1px solid #eee; padding:10px 0; }
.delete { background:red; margin-top:5px; }
.hidden { display:none; }
</style>

</head>

<body>

<div id="login" class="card">
<h2>Admin Login</h2>
<input id="emailInput" placeholder="Email">
<input id="passwordInput" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="dashboard" class="hidden">

<div class="card">
<h2>Add Video</h2>
<input id="title" placeholder="Title">
<input id="channel" placeholder="Channel">
<input id="url" placeholder="Video URL">
<input id="thumb" placeholder="Thumbnail (optional)">
<select id="category">
<option>Movie</option>
<option>Funny</option>
<option>Music</option>
</select>
<button onclick="addVideo()">Save</button>
</div>

<div class="card">
<h2>All Videos</h2>
<div id="list"></div>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>
const supabase = window.supabase.createClient(
 "https://psvpzoblbyfrofzaltbw.supabase.com",
 "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzdnB6b2JsYnlmcm9memFsdGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTM3NDIsImV4cCI6MjA5MDA4OTc0Mn0.rmidmNF4s1F_Fjk10AJWeig5oM-sqABnZNoWwn09jmQ"
);

async function login() {
 const email = document.getElementById("emailInput").value;
 const password = document.getElementById("passwordInput").value;

 const { error } = await supabase.auth.signInWithPassword({ email, password });

 if (error) return alert("Login failed!");

 document.getElementById("login").classList.add("hidden");
 document.getElementById("dashboard").classList.remove("hidden");
 loadVideos();
}

async function logout() {
 await supabase.auth.signOut();
 location.reload();
}

async function addVideo() {
 let url = document.getElementById("url").value.trim();
 let thumb = document.getElementById("thumb").value.trim();

 if (!url) return alert("URL লাগবে!");

 if (url.includes("dropbox.com")) {
   url = url.split('?')[0] + "?raw=1";
 }

 if (!thumb) {
   thumb = "https://via.placeholder.com/320x180?text=MiniTube";
 }

 const { error } = await supabase.from("videos").insert([{
   title: document.getElementById("title").value,
   channel: document.getElementById("channel").value,
   url: url,
   thumbnail: thumb,
   category: document.getElementById("category").value
 }]);

 if (error) return alert("Save failed!");

 alert("Saved!");
 loadVideos();
}

async function loadVideos() {
 const { data } = await supabase
   .from("videos")
   .select("*")
   .order("id", { ascending:false });

 const list = document.getElementById("list");
 list.innerHTML = "";

 data.forEach(v => {
   const div = document.createElement("div");
   div.className = "video";

   div.innerHTML = `
     <b>${v.title}</b><br>
     ${v.channel || ""}<br>
     <button class="delete" onclick="deleteVideo('${v.id}')">Delete</button>
   `;

   list.appendChild(div);
 });
}

async function deleteVideo(id) {
 if (!confirm("Delete করতে চান?")) return;

 await supabase.from("videos").delete().eq("id", id);
 loadVideos();
}

supabase.auth.getSession().then(({ data }) => {
 if (data.session) {
   document.getElementById("login").classList.add("hidden");
   document.getElementById("dashboard").classList.remove("hidden");
   loadVideos();
 }
});
</script>

</body>
</html>

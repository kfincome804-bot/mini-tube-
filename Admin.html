<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>MiniTube Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: #fff; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .btn-save { background: #007bff; color: #fff; }
        .btn-add { background: #28a745; color: #fff; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="box">
        <h2>⚙️ অ্যাপ সেটিংস</h2>
        <input id="set-ad" placeholder="বিজ্ঞাপনের লিঙ্ক (Ad Link)">
        <input id="set-cost" type="number" placeholder="ভিডিও দেখতে কত পয়েন্ট কাটবে?">
        <button class="btn-save" onclick="updateSettings()">সেটিংস সেভ করুন</button>
    </div>

    <div class="box">
        <h2>🎬 ভিডিও যোগ করুন</h2>
        <input id="v-title" placeholder="ভিডিওর নাম (Title)">
        <input id="v-url" placeholder="ভিডিও লিঙ্ক (Direct/Dropbox URL)">
        <input id="v-thumb" placeholder="থাম্বনেইল ইমেজ লিঙ্ক">
        <button class="btn-add" onclick="addVideo()">ভিডিও যুক্ত করুন</button>
    </div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyC1V3fowb7Tt1PEIqQYNQQQWGsuAwiJqk8",
        projectId: "mini-tube-6bf85",
        appId: "1:415016883999:web:9b9d0af2e3244af794022a"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Settings Update Function
    async function updateSettings() {
        const ad = document.getElementById('set-ad').value;
        const cost = Number(document.getElementById('set-cost').value);
        if(!ad || !cost) return alert("দয়া করে বিজ্ঞাপনের লিঙ্ক এবং পয়েন্ট দিন!");
        
        await db.collection('settings').doc('app_settings').set({ 
            ad_link: ad, 
            min_points: cost 
        }, { merge: true });
        
        alert("সেটিংস সফলভাবে সেভ হয়েছে!");
    }

    // Add Video Function
    async function addVideo() {
        const title = document.getElementById('v-title').value;
        let url = document.getElementById('v-url').value;
        const thumb = document.getElementById('v-thumb').value;
        
        if(!title || !url || !thumb) return alert("দয়া করে টাইটেল, ভিডিও লিঙ্ক এবং থাম্বনেইল দিন!");
        
        // Dropbox link auto-converter for direct streaming
        if(url.includes("dropbox.com")) {
            url = url.split('?')[0] + "?raw=1";
        }

        await db.collection('videos').add({ 
            title: title, 
            url: url, 
            thumbnail: thumb, 
            channel: "MiniTube" 
        });
        
        alert("ভিডিও সফলভাবে যোগ করা হয়েছে!");
        
        // Clear inputs after adding
        document.getElementById('v-title').value = "";
        document.getElementById('v-url').value = "";
        document.getElementById('v-thumb').value = "";
    }
</script>
</body>
</html>

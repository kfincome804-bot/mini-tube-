<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniTube Pro - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #ff0000; --bg: #f0f2f5; --card-bg: #fff; --text: #333; --accent: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { color: var(--main); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--accent); color: white; transition: 0.3s; }
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h2>নতুন ভিডিও যোগ করুন</h2>
    <div class="form-group">
        <label>ভিডিও টাইটেল</label>
        <input type="text" id="v-title" placeholder="ভিডিওর শিরোনাম">
    </div>
    <div class="form-group">
        <label>চ্যানেল নাম</label>
        <input type="text" id="v-channel" placeholder="চ্যানেল বা ইউজারের নাম">
    </div>
    <div class="form-group">
        <label>ভিডিও লিঙ্ক (Dropbox/Direct MP4)</label>
        <input type="text" id="v-url" placeholder="লিঙ্ক পেস্ট করুন">
    </div>
    <div class="form-group">
        <label>থাম্বনেইল লিঙ্ক (ঐচ্ছিক)</label>
        <input type="text" id="v-thumb" placeholder="ছবির লিঙ্ক">
    </div>
    <div class="form-group">
        <label>ক্যাটাগরি</label>
        <select id="v-cat">
            <option value="Movie">Movie</option>
            <option value="Funny">Funny</option>
            <option value="Music">Music</option>
        </select>
    </div>
    <button class="btn" id="save-btn" onclick="saveVideo()">সেভ করুন</button>
</div>

<script>
    // আপডেট করা সঠিক URL এবং Anon Key
    const S_URL = "https://psvpzoblbyfrofzaltbw.supabase.com"; 
    const S_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzdnB6b2JsYnlmcm9memFsdGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTM3NDIsImV4cCI6MjA5MDA4OTc0Mn0.rmidmNF4s1F_Fjk10AJWeig5oM-sqABnZNoWwn09jmQ";
    
    const supabaseClient = supabase.createClient(S_URL, S_KEY);

    window.saveVideo = async function() {
        let url = document.getElementById('v-url').value.trim();
        const title = document.getElementById('v-title').value.trim();
        const channel = document.getElementById('v-channel').value.trim();
        let thumb = document.getElementById('v-thumb').value.trim() || "https://via.placeholder.com/320x180?text=MiniTube";
        const category = document.getElementById('v-cat').value;

        if (!title || !url) return alert("টাইটেল এবং লিঙ্ক দিন!");

        // ড্রপবক্স লিঙ্ক অটো-ফিক্স
        if (url.includes("dropbox.com")) {
            url = url.split('?')[0] + "?raw=1";
        }

        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.innerText = "সেভ হচ্ছে...";

        try {
            const { error } = await supabaseClient
                .from('videos')
                .insert([{
                    title: title,
                    channel: channel,
                    url: url,
                    category: category,
                    thumbnail: thumb
                }]);

            if (error) {
                alert("ডাটাবেস এরর: " + error.message);
                console.error(error);
            } else {
                alert("অভিনন্দন! ভিডিওটি সফলভাবে সেভ হয়েছে।");
                location.reload(); 
            }
        } catch (networkError) {
            alert("নেটওয়ার্ক এরর (Failed to fetch):\n১. আপনার ইন্টারনেটের সমস্যা বা ডোমেইন ব্লক।\n২. VPN চালু করে একবার ট্রাই করুন।");
            console.error(networkError);
        } finally {
            btn.disabled = false;
            btn.innerText = "সেভ করুন";
        }
    }
</script>
</body>
</html>

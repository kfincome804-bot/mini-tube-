<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniTube Pro - Error Free Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main: #ff0000; --bg: #f4f7f6; --card-bg: #fff; --text: #333; --accent: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .admin-container { max-width: 900px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .admin-container { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        h2 { color: var(--main); font-size: 18px; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #666; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background: var(--accent); color: white; font-size: 16px; }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
        .video-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 5px; border-radius: 5px; }
        .v-thumb { width: 60px; height: 40px; border-radius: 4px; object-fit: cover; background: #eee; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="admin-content" style="display:none;">
    <div class="admin-container">
        
        <div class="card">
            <h2>নতুন ভিডিও যোগ করুন</h2>
            <div class="form-group">
                <label>ভিডিওর টাইটেল</label>
                <input type="text" id="v-title" placeholder="যেমন: My Awesome Video">
            </div>
            <div class="form-group">
                <label>চ্যানেলের নাম</label>
                <input type="text" id="v-channel" placeholder="আপনার নাম বা চ্যানেলের নাম">
            </div>
            <div class="form-group">
                <label>ভিডিও লিঙ্ক (Dropbox/MP4)</label>
                <input type="text" id="v-url" placeholder="লিঙ্ক পেস্ট করুন">
            </div>
            <div class="form-group">
                <label>থাম্বনেইল লিঙ্ক (ঐচ্ছিক/ইচ্ছেমতো)</label>
                <input type="text" id="v-thumb" placeholder="ছবির লিঙ্ক (ফাঁকা রাখলে ডিফল্ট ছবি বসবে)">
            </div>
            <div class="form-group">
                <label>ক্যাটাগরি</label>
                <select id="v-cat">
                    <option value="Movie">Movie</option>
                    <option value="Funny">Funny</option>
                    <option value="Music">Music</option>
                </select>
            </div>
            <button class="btn btn-save" id="save-btn" onclick="saveVideo()">সেভ করুন</button>
        </div>

        <div class="card">
            <h2>ভিডিও লিস্ট (মোট: <span id="total-count">0</span>)</h2>
            <div id="video-list">লোড হচ্ছে...</div>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASS = "@24342211";
    const userPass = prompt("পাসওয়ার্ড দিন:");

    if (userPass !== ADMIN_PASS) {
        alert("ভুল পাসওয়ার্ড!");
        document.body.innerHTML = "<h1 style='text-align:center; color:red; margin-top:50px;'>পাসওয়ার্ড ভুল! রিফ্রেশ করে আবার চেষ্টা করুন।</h1>";
    } else {
        document.getElementById('admin-content').style.display = 'block';
        startAdmin();
    }

    function startAdmin() {
        const S_URL = "https://psvpzoblbyfromfzaltbw.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzdnB6b2JsYnlmcm9memFsdGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTM3NDIsImV4cCI6MjA5MDA4OTc0Mn0.rmidmNF4s1F_Fjk10AJWeig5oM-sqABnZNoWwn09jmQ";
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        window.saveVideo = async function() {
            let url = document.getElementById('v-url').value.trim();
            const title = document.getElementById('v-title').value.trim();
            const channel = document.getElementById('v-channel').value.trim();
            let thumb = document.getElementById('v-thumb').value.trim();
            const category = document.getElementById('v-cat').value;

            if (!title || !url) return alert("দয়া করে টাইটেল এবং লিঙ্ক দিন!");

            // ড্রপবক্স লিঙ্ক অটো-ফিক্স
            if (url.includes("dropbox.com")) {
                url = url.split('?')[0] + "?raw=1";
            }

            // থাম্বনেইল না দিলে একটি ডিফল্ট ছবি সেট করা
            if (!thumb) {
                thumb = "https://via.placeholder.com/320x180?text=No+Thumbnail";
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = "সেভ হচ্ছে...";

            try {
                // সরাসরি ডাটাবেসে সেভ করা (কোনো Fetch করার চেষ্টা করবে না)
                const { error } = await supabaseClient.from('videos').insert([{
                    title: title,
                    channel: channel,
                    url: url,
                    category: category,
                    thumbnail: thumb
                }]);

                if (error) {
                    throw error;
                } else {
                    alert("ভিডিও সফলভাবে সেভ হয়েছে!");
                    document.getElementById('v-title').value = '';
                    document.getElementById('v-url').value = '';
                    document.getElementById('v-thumb').value = '';
                    loadVideos();
                }
            } catch (err) {
                alert("এরর: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "সেভ করুন";
            }
        }

        async function loadVideos() {
            try {
                const { data: videos } = await supabaseClient
                    .from('videos')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                const list = document.getElementById('video-list');
                document.getElementById('total-count').innerText = videos ? videos.length : 0;
                list.innerHTML = '';
                
                if (videos && videos.length > 0) {
                    videos.forEach(v => {
                        list.innerHTML += `
                            <div class="video-item">
                                <img src="${v.thumbnail}" class="v-thumb" onerror="this.src='https://via.placeholder.com/60x40?text=Video'">
                                <div style="flex-grow:1; font-size:13px;">
                                    <b>${v.title}</b><br>
                                    <small style="color:#777">${v.channel || 'No Channel'}</small>
                                </div>
                                <button class="btn-delete" onclick="deleteVideo('${v.id}')">ডিলিট</button>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = "<p style='text-align:center; color:#999;'>কোনো ভিডিও পাওয়া যায়নি।</p>";
                }
            } catch (err) {
                console.error("Load error:", err);
            }
        }

        window.deleteVideo = async function(id) {
            if (confirm("আপনি কি নিশ্চিত যে এই ভিডিওটি ডিলিট করতে চান?")) {
                const { error } = await supabaseClient.from('videos').delete().eq('id', id);
                if (error) alert("ডিলিট করতে সমস্যা হয়েছে: " + error.message);
                else loadVideos();
            }
        }

        loadVideos();
    }
</script>
</body>
</html>
